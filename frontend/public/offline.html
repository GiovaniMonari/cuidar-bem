<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>CuidarBem offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eff6ff;
        color: #172554;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(37, 99, 235, 0.18);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 80px rgba(30, 64, 175, 0.18);
        padding: 32px;
        text-align: center;
      }

      img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.2;
      }

      p {
        margin: 14px 0 24px;
        color: #475569;
        line-height: 1.55;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 14px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192x192.png" alt="" />
      <h1>Você está offline</h1>
      <p>Não conseguimos carregar o CuidarBem agora. Confira sua conexão e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
